# The lily58_left shield enables the encoder node in DTS unconditionally,
# so this driver must be compiled even if no physical encoder is installed.
# With pull-up pins, no phantom events occur without a real encoder.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y 

