# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # Standard split mode: left half is USB central
  - board: nice_nano
    shield: lily58_left
  - board: nice_nano
    shield: lily58_right

  # Dongle mode: dedicated USB dongle is central, both halves are BLE peripherals.
  # Flash lily58_dongle    → the dongle board
  # Flash lily58_left_dongle_mode  → left half (peripheral only)
  # Flash standard lily58_right    → right half (already a peripheral, no change)
  - board: nice_nano
    shield: lily58_dongle
    artifact-name: lily58_dongle
  - board: nice_nano
    shield: lily58_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: lily58_left_dongle_mode
